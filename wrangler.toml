name = "makaron-music-library-api"
main = "worker/index.js"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[vars]
LINK_TTL_SECONDS = "900"

[[r2_buckets]]
binding = "MUSIC"
bucket_name = "makaron-music-library"

[[d1_databases]]
binding = "DB"
database_name = "makaron-music-library"
database_id = "621ede7e-29a2-4b68-9d4b-2759b82e5e11"
migrations_dir = "migrations"
